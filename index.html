<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2 Key Word Transformations — Part 4</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#13131a;--card:#1a1a24;--border:rgba(255,255,255,.07);
  --text:#e8e8f0;--muted:rgba(232,232,240,.45);--faint:rgba(232,232,240,.18);
  --gold:#d4a853;--gold-dim:rgba(212,168,83,.15);--gold-ring:rgba(212,168,83,.35);
  --green:#4ade80;--green-dim:rgba(74,222,128,.12);
  --red:#f87171;--red-dim:rgba(248,113,113,.12);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,.12);
  --purple:#c084fc;--purple-dim:rgba(192,132,252,.12);
  --amber:#fbbf24;--amber-dim:rgba(251,191,36,.12);
  --teal:#2dd4bf;--teal-dim:rgba(45,212,191,.12);
  --pill-colors:var(--gold),var(--blue),var(--purple),var(--teal),var(--amber),var(--green),var(--gold),var(--blue),var(--purple),var(--teal);
}

html,body{width:100%;min-height:100%;background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
.brand span{color:var(--muted);font-weight:400}
.hstats{display:flex;gap:1.5rem;align-items:center}
.hstat{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:.4rem}
.hstat strong{color:var(--text);font-weight:600}
.dot-ok{width:7px;height:7px;border-radius:50%;background:var(--green)}
.dot-err{width:7px;height:7px;border-radius:50%;background:var(--red)}

/* ── PAGE PILLS NAV ── */
.pills-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1.5rem;display:flex;align-items:center;gap:.5rem;overflow-x:auto;scrollbar-width:none}
.pills-bar::-webkit-scrollbar{display:none}
.pills-label{font-size:.6rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);white-space:nowrap;flex-shrink:0;margin-right:.25rem}
.pill{font-family:'Syne',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .85rem;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;position:relative}
.pill:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.pill.active{background:var(--gold-dim);border-color:var(--gold-ring);color:var(--gold)}
.pill::after{content:'';width:5px;height:5px;border-radius:50%;margin-left:.4rem;vertical-align:middle;display:inline-block;opacity:0;transition:opacity .3s}
.pill.done-perfect::after{background:var(--green);opacity:1}
.pill.done-partial::after{background:var(--amber);opacity:1}

/* ── MAIN ── */
.main{max-width:900px;margin:0 auto;padding:2rem 1.5rem 4rem}

/* ── SECTION HEADER ── */
.section-head{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.section-num{font-family:'Syne',sans-serif;font-size:3.5rem;font-weight:800;line-height:1;color:var(--gold);opacity:.15}
.section-info{flex:1}
.section-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--text)}
.section-sub{font-size:.78rem;color:var(--muted);margin-top:.2rem}
.section-progress{display:flex;align-items:center;gap:.75rem;margin-left:auto}
.prog-bar{width:80px;height:4px;border-radius:4px;background:var(--border);overflow:hidden}
.prog-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .4s}
.prog-text{font-size:.65rem;font-weight:600;color:var(--muted);white-space:nowrap}

/* ── CARD ── */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:.85rem;overflow:hidden;transition:border-color .3s}
.q-card.state-ok{border-color:rgba(74,222,128,.25)}
.q-card.state-err{border-color:rgba(248,113,113,.2)}

.q-head{display:flex;align-items:stretch;gap:0}
.q-num{display:flex;align-items:center;justify-content:center;width:52px;flex-shrink:0;background:rgba(255,255,255,.03);border-right:1px solid var(--border);font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;color:var(--faint)}
.q-body{flex:1;padding:1rem 1.25rem}
.q-sentence{font-size:.95rem;line-height:1.65;color:var(--text);margin-bottom:.6rem}
.q-keyword-row{display:flex;align-items:center;gap:.65rem;flex-wrap:wrap}
.kw-badge{font-family:'Syne',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:.28rem .75rem;border-radius:999px;background:var(--gold-dim);border:1px solid var(--gold-ring);color:var(--gold)}
.kw-label{font-size:.7rem;color:var(--muted)}

/* ── INPUT AREA ── */
.q-answer{padding:.85rem 1.25rem;border-top:1px solid var(--border);background:rgba(255,255,255,.015);display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.answer-prefix{font-size:.88rem;color:var(--muted);white-space:nowrap;flex-shrink:0}
.answer-input{flex:1;min-width:180px;background:transparent;border:none;border-bottom:1.5px solid var(--faint);padding:.35rem 0;font-family:'Instrument Sans',sans-serif;font-size:.92rem;color:var(--text);outline:none;transition:border-color .2s;letter-spacing:.02em}
.answer-input::placeholder{color:var(--faint);font-style:italic;font-size:.82rem}
.answer-input:focus{border-bottom-color:var(--gold)}
.answer-input.correct{border-bottom-color:var(--green);color:var(--green)}
.answer-input.wrong{border-bottom-color:var(--red);color:var(--red)}
.answer-suffix{font-size:.88rem;color:var(--muted);white-space:nowrap;flex-shrink:0}

.check-btn{font-family:'Syne',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.42rem 1rem;border-radius:999px;background:var(--gold-dim);border:1px solid var(--gold-ring);color:var(--gold);cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0}
.check-btn:hover{background:rgba(212,168,83,.25)}
.check-btn:disabled{opacity:.3;cursor:default}

/* ── FEEDBACK ── */
.q-feedback{padding:.6rem 1.25rem .75rem;display:none;align-items:center;gap:.6rem;border-top:1px solid var(--border)}
.q-feedback.show{display:flex}
.fb-icon{font-size:.9rem;flex-shrink:0}
.fb-msg{font-size:.8rem;line-height:1.5;color:var(--muted)}
.fb-msg strong{color:var(--text);font-weight:600}
.answer-reveal{font-size:.78rem;font-weight:600;padding:.25rem .65rem;border-radius:8px;margin-left:auto;white-space:nowrap;flex-shrink:0}
.answer-reveal.ok{background:var(--green-dim);color:var(--green)}
.answer-reveal.err{background:var(--red-dim);color:var(--red)}

/* ── BATCH CONTROLS ── */
.batch-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem}
.reveal-all-btn{font-family:'Syne',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.42rem 1.1rem;border-radius:999px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .2s}
.reveal-all-btn:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.reset-btn{font-family:'Syne',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.42rem 1.1rem;border-radius:999px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .2s}
.reset-btn:hover{border-color:rgba(248,113,113,.4);color:var(--red)}

/* ── GRAMMAR TAG ── */
.grammar-tag{font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:.18rem .5rem;border-radius:6px;background:rgba(255,255,255,.05);color:var(--faint)}

/* ── INFOGRAPHIC ACCENT lines ── */
.accent-line{height:2px;background:linear-gradient(90deg,var(--gold) 0%,transparent 100%);margin-bottom:2rem;border-radius:2px;width:60px}

/* ── SCORE RING ── */
.score-ring-wrap{display:flex;align-items:center;gap:1rem;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:.75rem 1.25rem;margin-bottom:1.5rem}
.score-ring{width:48px;height:48px;border-radius:50%;border:3px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.score-ring svg{position:absolute;top:-3px;left:-3px;width:54px;height:54px;transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke:var(--gold);stroke-width:3;stroke-linecap:round;stroke-dasharray:145;stroke-dashoffset:145;transition:stroke-dashoffset .6s ease}
.score-ring-num{font-family:'Syne',sans-serif;font-size:.75rem;font-weight:800;color:var(--gold);position:relative;z-index:1}
.score-info{flex:1}
.score-info-title{font-family:'Syne',sans-serif;font-size:.75rem;font-weight:700;color:var(--text)}
.score-info-sub{font-size:.7rem;color:var(--muted);margin-top:.15rem}
.score-breakdown{display:flex;gap:1rem}
.sbd{display:flex;align-items:center;gap:.35rem;font-size:.7rem;color:var(--muted)}

/* ── HIDDEN SECTION ── */
.page-section{display:none}
.page-section.active{display:block}

@media(max-width:600px){
  .q-body{padding:.8rem 1rem}
  .q-answer{padding:.7rem 1rem}
  .q-feedback{padding:.5rem 1rem .65rem}
  .section-num{font-size:2.5rem}
  .hstats{gap:.75rem}
}
</style>
</head>

let globalOk=0, globalErr=0, globalTotal=0;
const answered={};

function init(){
  buildPills();
  buildSections();
  showSection(0);
}

function buildPills(){
  const bar=document.querySelector('.pills-bar');
  PAGES.forEach((p,i)=>{
    const btn=document.createElement('button');
    btn.className='pill'+(i===0?' active':'');
    btn.textContent=p.label;
    btn.dataset.idx=i;
    btn.id='pill-'+i;
    btn.addEventListener('click',()=>showSection(i));
    bar.appendChild(btn);
  });
}

function buildSections(){
  const main=document.getElementById('mainContent');
  PAGES.forEach((p,pi)=>{
    const sec=document.createElement('div');
    sec.className='page-section'+(pi===0?' active':'');
    sec.id='section-'+pi;

    sec.innerHTML=`
      <div class="accent-line" style="background:linear-gradient(90deg,${p.accent},transparent)"></div>
      <div class="section-head">
        <div class="section-num">${p.range[0]}–${p.range[1]}</div>
        <div class="section-info">
          <div class="section-title">${p.tag}</div>
          <div class="section-sub">Key Word Transformation · B2 Cambridge Use of English Part 4</div>
        </div>
        <div class="section-progress">
          <div class="prog-bar"><div class="prog-fill" id="prog-${pi}" style="width:0%;background:${p.accent}"></div></div>
          <div class="prog-text" id="prog-text-${pi}">0 / 20</div>
        </div>
      </div>
      <div class="batch-bar">
        <div id="score-ring-${pi}" class="score-ring-wrap">
          <div class="score-ring">
            <svg viewBox="0 0 54 54"><circle cx="27" cy="27" r="23" id="ring-circle-${pi}"/></svg>
            <span class="score-ring-num" id="ring-num-${pi}">0%</span>
          </div>
          <div class="score-info">
            <div class="score-info-title">Section progress</div>
            <div class="score-info-sub score-breakdown">
              <span class="sbd"><div class="dot-ok" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green)"></div>&nbsp;<span id="sbd-ok-${pi}">0</span> correct</span>
              <span class="sbd"><div class="dot-err" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--red)"></div>&nbsp;<span id="sbd-err-${pi}">0</span> wrong</span>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:.5rem">
          <button class="reveal-all-btn" onclick="revealAll(${pi})">Show all answers</button>
          <button class="reset-btn" onclick="resetSection(${pi})">Reset</button>
        </div>
      </div>
      <div id="cards-${pi}">${p.items.map(item=>buildCard(item,p.accent)).join('')}</div>
    `;
    main.appendChild(sec);
  });
}

function buildCard(item, accent){
  const id=`q${item.n}`;
  return `
  <div class="q-card" id="card-${item.n}">
    <div class="q-head">
      <div class="q-num">${item.n}</div>
      <div class="q-body">
        <div class="q-sentence">${item.sent}</div>
        <div class="q-keyword-row">
          <span class="kw-badge" style="background:rgba(${hexToRgb(accent)},.13);border-color:rgba(${hexToRgb(accent)},.35);color:${accent}">${item.key}</span>
          <span class="kw-label">Use the key word to complete the second sentence</span>
          <span class="grammar-tag">${item.grammar}</span>
        </div>
      </div>
    </div>
    <div class="q-answer" id="ans-${item.n}">
      <span class="answer-prefix">${escHtml(item.pre)}</span>
      <input class="answer-input" id="input-${item.n}" placeholder="type the missing words…" 
        autocomplete="off" autocorrect="off" spellcheck="false"
        onkeydown="if(event.key==='Enter')checkAnswer(${item.n})">
      <span class="answer-suffix">${escHtml(item.post)}</span>
      <button class="check-btn" id="btn-${item.n}" onclick="checkAnswer(${item.n})">Check</button>
    </div>
    <div class="q-feedback" id="fb-${item.n}">
      <span class="fb-icon" id="fbicon-${item.n}"></span>
      <span class="fb-msg" id="fbmsg-${item.n}"></span>
      <span class="answer-reveal" id="fbrev-${item.n}"></span>
    </div>
  </div>`;
}

function hexToRgb(hex){
  const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r?`${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}`:'212,168,83';
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function findPageIdx(n){
  return PAGES.findIndex(p=>n>=p.range[0]&&n<=p.range[1]);
}
function findItem(n){
  for(const p of PAGES){const i=p.items.find(x=>x.n===n);if(i)return i;}return null;
}

function normalize(s){return s.trim().toLowerCase().replace(/['']/g,"'").replace(/\s+/g,' ')}

function checkAnswer(n){
  if(answered[n])return;
  const item=findItem(n);
  if(!item)return;
  const inp=document.getElementById('input-'+n);
  if(!inp)return;
  const val=normalize(inp.value);
  const correct=normalize(item.blank);
  // allow minor variations: accept if levenshtein ≤2 for long answers, exact for short
  const ok=val===correct||synonymMatch(val,correct);
  answered[n]=ok?'ok':'err';
  inp.disabled=true;
  inp.classList.add(ok?'correct':'wrong');
  const btn=document.getElementById('btn-'+n);
  if(btn)btn.disabled=true;
  const card=document.getElementById('card-'+n);
  card.classList.add(ok?'state-ok':'state-err');
  const fb=document.getElementById('fb-'+n);
  fb.classList.add('show');
  document.getElementById('fbicon-'+n).textContent=ok?'✓':'✗';
  document.getElementById('fbicon-'+n).style.color=ok?'var(--green)':'var(--red)';
  if(ok){
    document.getElementById('fbmsg-'+n).innerHTML=`<strong>Correct!</strong> ${item.hint}`;
  }else{
    document.getElementById('fbmsg-'+n).innerHTML=`<strong>Not quite.</strong> ${item.hint}`;
    const rev=document.getElementById('fbrev-'+n);
    rev.className='answer-reveal err';
    rev.textContent=item.blank;
    inp.value=item.blank;
  }
  // update stats
  const pi=findPageIdx(n);
  if(ok){globalOk++;} else {globalErr++;}
  globalTotal++;
  updateGlobalStats();
  updateSectionStats(pi);
}

function synonymMatch(val,correct){
  // Accept if all words match (order matters), ignoring articles in some cases
  const va=val.split(' '), ca=correct.split(' ');
  if(va.length!==ca.length)return false;
  return va.every((w,i)=>w===ca[i]);
}

function revealAll(pi){
  const page=PAGES[pi];
  page.items.forEach(item=>{
    if(!answered[item.n]){
      const inp=document.getElementById('input-'+item.n);
      if(inp){
        inp.value=item.blank;
        inp.disabled=true;
        inp.classList.add('correct');
      }
      const btn=document.getElementById('btn-'+item.n);
      if(btn)btn.disabled=true;
      answered[item.n]='revealed';
      const card=document.getElementById('card-'+item.n);
      card.classList.add('state-ok');
      const fb=document.getElementById('fb-'+item.n);
      fb.classList.add('show');
      document.getElementById('fbicon-'+item.n).textContent='→';
      document.getElementById('fbicon-'+item.n).style.color='var(--gold)';
      document.getElementById('fbmsg-'+item.n).innerHTML=`<strong>Answer:</strong> ${item.hint}`;
    }
  });
  updateSectionStats(pi);
}

function resetSection(pi){
  const page=PAGES[pi];
  page.items.forEach(item=>{
    const n=item.n;
    if(answered[n]){
      const wasOk=answered[n]==='ok';
      if(wasOk)globalOk--;
      else if(answered[n]==='err')globalErr--;
      if(answered[n]!=='revealed')globalTotal--;
      delete answered[n];
      const inp=document.getElementById('input-'+n);
      if(inp){inp.value='';inp.disabled=false;inp.classList.remove('correct','wrong');}
      const btn=document.getElementById('btn-'+n);
      if(btn)btn.disabled=false;
      const card=document.getElementById('card-'+n);
      card.classList.remove('state-ok','state-err');
      const fb=document.getElementById('fb-'+n);
      fb.classList.remove('show');
    }
  });
  updateGlobalStats();
  updateSectionStats(pi);
}

function updateGlobalStats(){
  document.getElementById('globalOk').textContent=globalOk;
  document.getElementById('globalErr').textContent=globalErr;
  document.getElementById('globalTotal').textContent=globalTotal;
}

function updateSectionStats(pi){
  const page=PAGES[pi];
  let ok=0,err=0,done=0;
  page.items.forEach(item=>{
    const r=answered[item.n];
    if(r==='ok'){ok++;done++;}
    else if(r==='err'){err++;done++;}
    else if(r==='revealed'){done++;}
  });
  const total=page.items.length;
  const pct=Math.round(done/total*100);
  // progress bar
  const fill=document.getElementById('prog-'+pi);
  if(fill)fill.style.width=pct+'%';
  const ptxt=document.getElementById('prog-text-'+pi);
  if(ptxt)ptxt.textContent=done+' / '+total;
  // score ring
  const ringPct=total>0?Math.round(ok/total*100):0;
  const circle=document.getElementById('ring-circle-'+pi);
  if(circle){const offset=145-(145*(ringPct/100));circle.style.strokeDashoffset=offset;}
  const rnum=document.getElementById('ring-num-'+pi);
  if(rnum)rnum.textContent=ringPct+'%';
  document.getElementById('sbd-ok-'+pi).textContent=ok;
  document.getElementById('sbd-err-'+pi).textContent=err;
  // pill indicator
  const pill=document.getElementById('pill-'+pi);
  if(pill){
    pill.classList.remove('done-perfect','done-partial');
    if(done===total&&done>0){
      pill.classList.add(ok===total?'done-perfect':'done-partial');
    }
  }
}

function showSection(i){
  document.querySelectorAll('.page-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  document.getElementById('section-'+i).classList.add('active');
  document.getElementById('pill-'+i).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

init();
</script>
