<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2 Key Word Transformations</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;600;700;800&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080b12;--surface:#0e1320;--card:#131928;
  --border:rgba(255,255,255,.07);--text:#dde4f0;
  --muted:rgba(221,228,240,.45);--faint:rgba(221,228,240,.18);
  --blue:#4f8ef7;--blue-dim:rgba(79,142,247,.14);
  --green:#3dd68c;--red:#f06c6c;--gold:#e0a84b;
  --amber:#f7c948;--purple:#a78bfa;--purple-dim:rgba(167,139,250,.14);
  --leaf:#58BB43;--leaf-bright:#58BB43;--leaf-dim:rgba(88,187,67,.11);--leaf-glow:rgba(88,187,67,.28);
  --font-head:'Outfit',sans-serif;--font-mono:'DM Mono',monospace;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font-head);overflow:hidden}

/* ── LOADING ── */
#loadScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
#loadScreen.hidden{display:none}
.load-title{font-size:15px;font-weight:700;letter-spacing:.1em;color:var(--gold)}
.load-sub{font-size:12px;color:var(--muted);font-family:var(--font-mono)}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-err{color:var(--red);font-size:13px;text-align:center;max-width:320px;line-height:1.5}

/* ── TOP BAR ── */
#modeBar{position:fixed;top:0;left:0;right:0;z-index:200;height:52px;background:rgba(8,11,18,.98);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px}
.brand{font-size:13px;font-weight:800;letter-spacing:.04em;color:var(--gold)}
.brand span{color:var(--muted);font-weight:400}

.toggle-wrap{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:99px;padding:4px 6px 4px 10px}
.toggle-label{font-size:11px;font-weight:600;letter-spacing:.05em;color:var(--muted);transition:color .2s}
.toggle-label.active-label{color:var(--text)}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;border-radius:99px;cursor:pointer;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);transition:all .25s}
.slider::before{content:'';position:absolute;height:18px;width:18px;left:2px;top:2px;background:#fff;border-radius:50%;transition:all .25s;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.toggle input:checked + .slider{background:var(--leaf-dim);border-color:rgba(88,187,67,.45)}
.toggle input:checked + .slider::before{transform:translateX(20px);background:var(--leaf-bright)}

.hstats{display:flex;gap:14px;align-items:center;flex-shrink:0}
.hstat{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;font-family:var(--font-mono)}
.hstat strong{color:var(--text)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dg{background:var(--green)}.dr{background:var(--red)}

/* ── TABS ── */
#tabs{position:fixed;top:52px;left:0;right:0;z-index:99;background:rgba(8,11,18,.97);border-bottom:1px solid var(--border);display:flex;gap:5px;padding:7px 14px;overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{font-size:11px;font-weight:700;padding:4px 13px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.03em;font-family:var(--font-head)}
.tab:hover{border-color:rgba(255,255,255,.18);color:var(--text)}
.tab.active{background:var(--blue-dim);border-color:rgba(79,142,247,.4);color:var(--blue)}
.tab.grammar-active{background:var(--leaf-dim);border-color:rgba(88,187,67,.4);color:var(--leaf-bright)}
.tab.tok::after,.tab.tmix::after{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;margin-left:5px;vertical-align:middle}
.tab.tok::after{background:var(--green)}.tab.tmix::after{background:var(--amber)}

/* ── SLIDE ── */
#slide{position:fixed;top:100px;left:0;right:0;bottom:80px;display:flex;align-items:center;justify-content:center;padding:20px 40px;overflow-y:auto}
.slide-inner{width:100%;max-width:1100px;display:flex;flex-direction:column;align-items:center;gap:14px}
.q-counter{font-size:13px;color:var(--muted);letter-spacing:.07em;font-family:var(--font-mono)}

.sent-box{width:100%;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:30px 56px 22px;text-align:center;position:relative;overflow:hidden}
.sent-box::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(79,142,247,.07),transparent 70%);pointer-events:none;transition:background .4s}
body.gram .sent-box::before{background:radial-gradient(circle,rgba(88,187,67,.09),transparent 70%)}
body.gram #ansInput:focus{border-bottom-color:var(--leaf-bright)}
.orig-sent{font-size:24px;color:var(--muted);line-height:1.6;margin-bottom:16px;font-weight:400}
.kw-big{font-size:52px;font-weight:800;color:var(--blue);letter-spacing:.05em;line-height:1;margin-bottom:10px;transition:color .3s}
.kw-big.gram-mode{color:var(--leaf-bright);text-shadow:0 0 40px var(--leaf-glow),0 0 80px rgba(76,175,125,.1)}
.gram-tag{font-size:12px;color:var(--faint);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;padding:4px 11px;display:inline-block;font-family:var(--font-mono)}

.ans-row{width:100%;display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center}
.ans-pre,.ans-suf{font-size:24px;color:var(--muted);max-width:280px;text-align:center}
#ansInput{min-width:240px;flex:1;background:transparent;border:none;border-bottom:2px solid var(--faint);padding:10px 6px;font-size:24px;color:var(--text);outline:none;text-align:center;transition:border-color .2s;font-family:var(--font-head)}
#ansInput::placeholder{color:var(--faint);font-style:italic;font-size:19px}
#ansInput:focus{border-bottom-color:var(--blue)}
#ansInput.ok{border-bottom-color:var(--green);color:var(--green)}
#ansInput.err{border-bottom-color:var(--red);color:var(--red)}
#ansInput.rev{border-bottom-color:var(--gold);color:var(--gold)}
#checkBtn{font-size:14px;font-weight:700;padding:12px 28px;border-radius:99px;border:1px solid rgba(255,255,255,.14);background:transparent;color:var(--text);cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.04em;font-family:var(--font-head)}
#checkBtn:hover{background:rgba(255,255,255,.06)}
#checkBtn:disabled{opacity:.28;cursor:default}

#feedback{font-size:18px;color:var(--muted);text-align:center;min-height:26px;line-height:1.5;font-weight:600}
#feedback.ok{color:var(--green)}
#feedback.err{color:var(--red)}
#feedback.rev{color:var(--gold)}
#hintText{font-size:14px;color:var(--faint);text-align:center;min-height:20px;font-family:var(--font-mono)}

/* ── BOTTOM NAV ── */
#nav{position:fixed;bottom:0;left:0;right:0;height:72px;background:rgba(8,11,18,.98);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:10px;padding:0 14px}
.nav-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.06);color:var(--text)}
.nav-btn:disabled{opacity:.18;cursor:default}
#dotsWrap{display:flex;gap:5px;align-items:center;overflow-x:auto;max-width:500px;padding:4px;scrollbar-width:none}
#dotsWrap::-webkit-scrollbar{display:none}
.dn{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:transparent;cursor:pointer;flex-shrink:0;transition:all .15s}
.dn.cur{width:22px;border-radius:99px;background:var(--blue);border-color:var(--blue)}
.dn.cur.gram{background:var(--leaf-bright);border-color:var(--leaf-bright)}
.dn.dok{background:var(--green);border-color:var(--green)}
.dn.derr{background:var(--red);border-color:var(--red)}
.dn.drev{background:var(--gold);border-color:var(--gold)}

#actions{position:fixed;bottom:76px;right:14px;display:flex;gap:6px}
.tiny{font-size:10px;padding:4px 10px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--faint);cursor:pointer;transition:all .15s;font-family:var(--font-head)}
.tiny:hover{color:var(--muted);border-color:rgba(255,255,255,.18)}

/* ── MOBILE ── */
@media(max-width:600px){
  html,body{overflow:hidden;height:100dvh}
  #modeBar{height:48px;padding:0 12px}
  .brand{font-size:11px}
  .hstat{font-size:10px}
  .toggle-wrap{padding:3px 5px 3px 8px;gap:7px}
  .toggle-label{font-size:10px}
  .toggle{width:38px;height:20px}
  .slider::before{height:14px;width:14px;left:2px;top:2px}
  .toggle input:checked + .slider::before{transform:translateX(18px)}
  #tabs{top:48px;padding:6px 10px;gap:4px}
  .tab{font-size:10px;padding:3px 10px}
  #slide{top:90px;bottom:68px;padding:10px 12px;align-items:flex-start}
  .slide-inner{gap:10px;padding-bottom:8px}
  .q-counter{font-size:11px}
  .sent-box{border-radius:14px;padding:18px 16px 14px}
  .orig-sent{font-size:15px;margin-bottom:10px}
  .kw-big{font-size:36px;margin-bottom:8px}
  .gram-tag{font-size:10px;padding:3px 8px}
  .ans-row{flex-direction:column;gap:8px;align-items:stretch}
  .ans-pre,.ans-suf{font-size:14px;max-width:100%}
  #ansInput{font-size:17px;min-width:unset;width:100%;padding:10px 6px;border-bottom:2px solid var(--faint)}
  #ansInput::placeholder{font-size:14px}
  #checkBtn{font-size:13px;padding:12px 0;width:100%;border-radius:10px}
  #feedback{font-size:14px}
  #hintText{font-size:11px}
  #nav{height:68px;gap:7px;padding:0 10px}
  .nav-btn{width:38px;height:38px}
  #dotsWrap{max-width:calc(100vw - 110px);gap:4px}
  .dn{width:7px;height:7px}
  .dn.cur{width:16px}
  #actions{bottom:72px;right:10px}
  .tiny{font-size:9px;padding:3px 8px}
}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loadScreen">
  <div class="spinner"></div>
  <div class="load-title">B2 PART 4</div>
  <div class="load-sub">Loading questions…</div>
</div>

<div id="modeBar">
  <div class="brand">B2 Part 4 <span>Key Word Transformations</span></div>
  <div class="toggle-wrap">
    <span class="toggle-label active-label" id="lblSeq">SEQUENTIAL</span>
    <label class="toggle">
      <input type="checkbox" id="modeToggle">
      <span class="slider"></span>
    </label>
    <span class="toggle-label" id="lblGram">GRAMMAR</span>
  </div>
  <div class="hstats">
    <div class="hstat"><span class="dot dg"></span><strong id="gOk">0</strong>&nbsp;correct</div>
    <div class="hstat"><span class="dot dr"></span><strong id="gErr">0</strong>&nbsp;wrong</div>
    <div class="hstat" id="gTot">0 / 0</div>
  </div>
</div>

<div id="tabs"></div>

<div id="slide">
  <div class="slide-inner">
    <div class="q-counter" id="qCounter"></div>
    <div class="sent-box">
      <div class="orig-sent" id="origSent"></div>
      <div class="kw-big" id="kwBig"></div>
      <span class="gram-tag" id="gramTag"></span>
    </div>
    <div class="ans-row">
      <span class="ans-pre" id="ansPre"></span>
      <input id="ansInput" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="type the missing words…">
      <span class="ans-suf" id="ansSuf"></span>
      <button id="checkBtn">Check</button>
    </div>
    <div id="feedback"></div>
    <div id="hintText"></div>
  </div>
</div>

<div id="actions">
  <button class="tiny" id="revBtn">Show answer</button>
  <button class="tiny" id="resetBtn">Reset section</button>
</div>

<div id="nav">
  <button class="nav-btn" id="prevBtn">&#8592;</button>
  <div id="dotsWrap"></div>
  <button class="nav-btn" id="nextBtn">&#8594;</button>
</div>

<script>
// ═══════════════════════════════════════════════
//  DATA — loaded from JSON
// ═══════════════════════════════════════════════

// Inline data (fetched from b2_kwt_complete.json at runtime if available,
// otherwise falls back to this embedded copy)
let SEQ_PAGES = [];
let GRAM_PAGES = [];
let dataReady = false;

// ── INLINE FALLBACK DATA ──
// Paste the full contents of b2_kwt_complete.json between the backticks below.
// The app will use this if the JSON file cannot be fetched (e.g. when opening
// the HTML locally without a server).
const INLINE_JSON = null; // set to the parsed object if you want a pure offline build

// ── JSON PATH ── change this to wherever you host the file
const JSON_PATH = 'b2_kwt_complete.json';

async function loadData() {
  try {
    const res = await fetch(JSON_PATH);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    applyData(data);
  } catch(e) {
    if (INLINE_JSON) {
      applyData(INLINE_JSON);
    } else {
      showLoadError(e.message);
    }
  }
}

function applyData(data) {
  // Sequential pages: data.sequential.pages
  SEQ_PAGES = data.sequential.pages.map(p => ({
    label: p.label,
    range: p.range,
    items: p.items.map(it => ({
      n: it.n,
      sent: it.sentence,
      key: it.key,
      pre: it.pre,
      blank: it.answer,
      post: it.post,
      hint: it.hint,
      grammar: it.grammar
    }))
  }));

  // Grammar pages: data.grammar_rules.pages
  GRAM_PAGES = data.grammar_rules.pages.map(p => ({
    label: p.label,
    grammar: p.grammar,
    items: p.items.map(it => ({
      n: it.n,
      sent: it.sent,
      key: it.key,
      pre: it.pre,
      blank: it.blank,
      post: it.post,
      hint: it.hint,
      grammar: it.grammar
    }))
  }));

  SEQ_ALL = SEQ_PAGES.flatMap(p => p.items);
  dataReady = true;
  document.getElementById('loadScreen').classList.add('hidden');
  document.getElementById('gTot').textContent = `0 / ${SEQ_ALL.length}`;
  buildTabs();
  render();
}

function showLoadError(msg) {
  const s = document.getElementById('loadScreen');
  s.innerHTML = `<div class="load-err">
    <strong style="color:var(--red)">Could not load data</strong><br><br>
    Make sure <code>b2_kwt_complete.json</code> is in the same folder as this HTML file.<br><br>
    <span style="color:var(--faint)">${msg}</span>
  </div>`;
}

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let SEQ_ALL = [];
let grammarMode = false;
let seqCurIdx = 0;
let gramPageIdx = 0;
let gramCurIdx = 0;
let answered = {};   // key: `mode:pageIdx:itemIdx` → 'ok'|'err'|'revealed'
let gOk = 0, gErr = 0, gAnswered = 0;

// answered key helpers
function aKey(item, isGram, pageIdx) {
  return (isGram ? 'g' : 's') + ':' + pageIdx + ':' + item.n;
}

function getPages() { return grammarMode ? GRAM_PAGES : SEQ_PAGES; }
function getActiveList() {
  const pages = getPages();
  const pi = grammarMode ? gramPageIdx : getSeqPageIdx();
  return pages[pi] ? pages[pi].items : [];
}
function getSeqPageIdx() {
  const item = SEQ_ALL[seqCurIdx];
  if (!item) return 0;
  return SEQ_PAGES.findIndex(p => p.items.some(it => it.n === item.n));
}
function getCurItemIdx() { return grammarMode ? gramCurIdx : seqCurIdx - (SEQ_PAGES.slice(0, getSeqPageIdx()).reduce((s,p)=>s+p.items.length,0)); }
function getCurItem() {
  const list = getActiveList();
  const ci = grammarMode ? gramCurIdx : getCurItemIdx();
  return list[ci];
}
function getAnswerKey() {
  const item = getCurItem();
  if (!item) return null;
  const pi = grammarMode ? gramPageIdx : getSeqPageIdx();
  return aKey(item, grammarMode, pi);
}

// ═══════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════
function buildTabs() {
  const c = document.getElementById('tabs');
  c.innerHTML = '';
  const pages = getPages();
  pages.forEach((p, i) => {
    const b = document.createElement('button');
    b.className = 'tab';
    b.id = 'tab-' + i;
    b.textContent = p.label;
    b.onclick = () => goToPage(i);
    c.appendChild(b);
  });
  updateTabs();
}

function updateTabs() {
  const pages = getPages();
  const activePage = grammarMode ? gramPageIdx : getSeqPageIdx();
  pages.forEach((p, i) => {
    const t = document.getElementById('tab-' + i);
    if (!t) return;
    t.classList.remove('active', 'grammar-active', 'tok', 'tmix');
    if (i === activePage) t.classList.add(grammarMode ? 'grammar-active' : 'active');
    let ok = 0, done = 0;
    p.items.forEach(it => {
      const k = aKey(it, grammarMode, i);
      if (answered[k]) { done++; if (answered[k] === 'ok') ok++; }
    });
    if (done === p.items.length && done > 0) t.classList.add(ok === p.items.length ? 'tok' : 'tmix');
  });
  // scroll active tab into view
  const active = document.getElementById('tab-' + activePage);
  if (active) active.scrollIntoView({ inline: 'center', behavior: 'smooth' });
}

// ═══════════════════════════════════════════════
//  DOTS
// ═══════════════════════════════════════════════
function buildDots() {
  const c = document.getElementById('dotsWrap');
  c.innerHTML = '';
  const list = getActiveList();
  const ci = grammarMode ? gramCurIdx : getCurItemIdx();
  const pi = grammarMode ? gramPageIdx : getSeqPageIdx();
  list.forEach((item, i) => {
    const k = aKey(item, grammarMode, pi);
    const r = answered[k];
    const isCur = i === ci;
    let cls = 'dn' + (isCur ? ' cur' + (grammarMode ? ' gram' : '') : '') +
      (r === 'ok' ? ' dok' : r === 'err' ? ' derr' : r === 'revealed' ? ' drev' : '');
    const d = document.createElement('div');
    d.className = cls;
    d.title = 'Q' + item.n;
    d.onclick = () => goToInPage(i);
    c.appendChild(d);
  });
  const active = c.children[ci];
  if (active) active.scrollIntoView({ inline: 'center', behavior: 'smooth' });
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function render() {
  if (!dataReady) return;
  const list = getActiveList();
  const ci = grammarMode ? gramCurIdx : getCurItemIdx();
  const item = list[ci];
  if (!item) return;

  const k = getAnswerKey();
  const r = answered[k];

  // counter
  const totalInMode = grammarMode
    ? GRAM_PAGES.reduce((s, p) => s + p.items.length, 0)
    : SEQ_ALL.length;
  const globalIdx = grammarMode
    ? GRAM_PAGES.slice(0, gramPageIdx).reduce((s, p) => s + p.items.length, 0) + gramCurIdx
    : seqCurIdx;
  document.getElementById('qCounter').textContent =
    'Question ' + (globalIdx + 1) + ' of ' + totalInMode +
    ' · ' + getPages()[grammarMode ? gramPageIdx : getSeqPageIdx()].label;

  document.getElementById('origSent').textContent = item.sent;
  const kw = document.getElementById('kwBig');
  kw.textContent = item.key;
  kw.className = 'kw-big' + (grammarMode ? ' gram-mode' : '');
  document.getElementById('gramTag').textContent = item.grammar;
  document.getElementById('ansPre').textContent = item.pre;
  document.getElementById('ansSuf').textContent = item.post;

  const inp = document.getElementById('ansInput');
  const btn = document.getElementById('checkBtn');
  const fb = document.getElementById('feedback');
  const ht = document.getElementById('hintText');

  if (r) {
    inp.value = item.blank;
    inp.disabled = true;
    inp.className = r === 'ok' ? 'ok' : r === 'err' ? 'err' : 'rev';
    btn.disabled = true;
    if (r === 'ok') { fb.className = 'ok'; fb.textContent = '✓  Correct!'; }
    else if (r === 'err') { fb.className = 'err'; fb.textContent = '✗  Not quite — correct answer shown.'; }
    else { fb.className = 'rev'; fb.textContent = '↳  Answer revealed.'; }
    ht.textContent = item.hint;
  } else {
    inp.value = ''; inp.disabled = false; inp.className = '';
    btn.disabled = false;
    fb.className = ''; fb.textContent = '';
    ht.textContent = '';
    setTimeout(() => inp.focus(), 80);
  }

  // nav button states
  const pages = getPages();
  const ap = grammarMode ? gramPageIdx : getSeqPageIdx();
  const isFirstPage = ap === 0;
  const isLastPage = ap === pages.length - 1;
  const isFirstItem = ci === 0;
  const isLastItem = ci === list.length - 1;
  document.getElementById('prevBtn').disabled = isFirstPage && isFirstItem;
  document.getElementById('nextBtn').disabled = isLastPage && isLastItem;

  buildDots();
  updateTabs();

  document.getElementById('gOk').textContent = gOk;
  document.getElementById('gErr').textContent = gErr;
  const total = grammarMode
    ? GRAM_PAGES.reduce((s, p) => s + p.items.length, 0)
    : SEQ_ALL.length;
  document.getElementById('gTot').textContent = gAnswered + ' / ' + total;
}

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
function goToPage(pi) {
  if (grammarMode) {
    gramPageIdx = pi;
    gramCurIdx = 0;
  } else {
    const offset = SEQ_PAGES.slice(0, pi).reduce((s, p) => s + p.items.length, 0);
    seqCurIdx = offset;
  }
  render();
}

function goToInPage(i) {
  if (grammarMode) {
    gramCurIdx = i;
  } else {
    const offset = SEQ_PAGES.slice(0, getSeqPageIdx()).reduce((s, p) => s + p.items.length, 0);
    seqCurIdx = offset + i;
  }
  render();
}

function goNext() {
  const list = getActiveList();
  const ci = grammarMode ? gramCurIdx : getCurItemIdx();
  const pages = getPages();
  const ap = grammarMode ? gramPageIdx : getSeqPageIdx();

  if (ci < list.length - 1) {
    if (grammarMode) gramCurIdx++;
    else seqCurIdx++;
  } else if (ap < pages.length - 1) {
    goToPage(ap + 1);
    return;
  }
  render();
}

function goPrev() {
  const ci = grammarMode ? gramCurIdx : getCurItemIdx();
  const pages = getPages();
  const ap = grammarMode ? gramPageIdx : getSeqPageIdx();

  if (ci > 0) {
    if (grammarMode) gramCurIdx--;
    else seqCurIdx--;
  } else if (ap > 0) {
    const prevPage = pages[ap - 1];
    if (grammarMode) {
      gramPageIdx = ap - 1;
      gramCurIdx = prevPage.items.length - 1;
    } else {
      const offset = SEQ_PAGES.slice(0, ap - 1).reduce((s, p) => s + p.items.length, 0);
      seqCurIdx = offset + prevPage.items.length - 1;
    }
  }
  render();
}

// ═══════════════════════════════════════════════
//  CHECK
// ═══════════════════════════════════════════════
function norm(s) {
  return s.trim().toLowerCase().replace(/['']/g, "'").replace(/\s+/g, ' ');
}

function check() {
  const k = getAnswerKey();
  if (!k || answered[k]) return;
  const item = getCurItem();
  const inp = document.getElementById('ansInput');
  const ok = norm(inp.value) === norm(item.blank);
  answered[k] = ok ? 'ok' : 'err';
  if (ok) gOk++; else gErr++;
  gAnswered++;
  render();
}

// ═══════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════
document.getElementById('prevBtn').onclick = goPrev;
document.getElementById('nextBtn').onclick = goNext;
document.getElementById('checkBtn').onclick = check;
document.getElementById('ansInput').onkeydown = e => { if (e.key === 'Enter') check(); };

document.getElementById('revBtn').onclick = () => {
  const k = getAnswerKey();
  if (!k || answered[k]) return;
  answered[k] = 'revealed';
  gAnswered++;
  render();
};

document.getElementById('resetBtn').onclick = () => {
  const pages = getPages();
  const ap = grammarMode ? gramPageIdx : getSeqPageIdx();
  pages[ap].items.forEach(it => {
    const k = aKey(it, grammarMode, ap);
    const r = answered[k];
    if (r) {
      if (r === 'ok') gOk--;
      else if (r === 'err') gErr--;
      gAnswered--;
      delete answered[k];
    }
  });
  if (grammarMode) gramCurIdx = 0;
  else {
    const offset = SEQ_PAGES.slice(0, ap).reduce((s, p) => s + p.items.length, 0);
    seqCurIdx = offset;
  }
  render();
};

document.getElementById('modeToggle').onchange = function () {
  grammarMode = this.checked;
  document.body.classList.toggle('gram', grammarMode);
  document.getElementById('lblSeq').classList.toggle('active-label', !grammarMode);
  document.getElementById('lblGram').classList.toggle('active-label', grammarMode);
  buildTabs();
  render();
};

// Swipe
let tsX = 0, tsY = 0;
document.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tsX;
  const dy = e.changedTouches[0].clientY - tsY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0) goNext(); else goPrev();
  }
}, { passive: true });

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
loadData();
</script>
</body>
</html>
