<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2 Key Word Transformations</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#13131a;--card:#1a1a24;
  --border:rgba(255,255,255,.08);--text:#e8e8f0;
  --muted:rgba(232,232,240,.5);--faint:rgba(232,232,240,.2);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,.15);
  --green:#4ade80;--red:#f87171;--gold:#d4a853;
  --amber:#fbbf24;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;overflow:hidden}

/* HEADER - fixed */
#header{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;background:rgba(10,10,15,.97);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px}
.brand{font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--gold);white-space:nowrap}
.brand span{color:var(--muted);font-weight:400}
.hstats{display:flex;gap:16px;align-items:center;flex-shrink:0}
.hstat{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.hstat strong{color:var(--text)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dg{background:var(--green)}.dr{background:var(--red)}

/* TABS - fixed below header */
#tabs{position:fixed;top:52px;left:0;right:0;z-index:99;background:rgba(13,13,26,.97);border-bottom:1px solid var(--border);display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{font-size:11px;font-weight:600;padding:4px 12px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s}
.tab:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.tab.active{background:var(--blue-dim);border-color:rgba(96,165,250,.4);color:var(--blue)}
.tab.tok::after,.tab.tmix::after{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;margin-left:4px;vertical-align:middle}
.tab.tok::after{background:var(--green)}.tab.tmix::after{background:var(--amber)}

/* MAIN SLIDE AREA */
#slide{position:fixed;top:100px;left:0;right:0;bottom:80px;display:flex;align-items:center;justify-content:center;padding:20px 40px}

.slide-inner{width:100%;max-width:1200px;display:flex;flex-direction:column;align-items:center;gap:12px}

.q-counter{font-size:15px;color:var(--muted);letter-spacing:.06em}

/* THE SENTENCE BOX */
.sent-box{width:100%;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:32px 60px 24px;text-align:center}
.orig-sent{font-size:28px;color:var(--muted);line-height:1.55;margin-bottom:18px;font-weight:400}
.kw-big{font-size:48px;font-weight:700;color:var(--blue);letter-spacing:.06em;line-height:1;margin-bottom:12px}
.gram-tag{font-size:14px;color:var(--faint);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;padding:5px 12px;display:inline-block}

/* ANSWER ROW */
.ans-row{width:100%;display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center}
.ans-pre,.ans-suf{font-size:28px;color:var(--muted);max-width:300px;text-align:center}
#ansInput{min-width:260px;flex:1;background:transparent;border:none;border-bottom:3px solid var(--faint);padding:10px 6px;font-size:28px;color:var(--text);outline:none;text-align:center;transition:border-color .2s;font-family:inherit}
#ansInput::placeholder{color:var(--faint);font-style:italic;font-size:22px}
#ansInput:focus{border-bottom-color:var(--blue)}
#ansInput.ok{border-bottom-color:var(--green);color:var(--green)}
#ansInput.err{border-bottom-color:var(--red);color:var(--red)}
#ansInput.rev{border-bottom-color:var(--gold);color:var(--gold)}
#checkBtn{font-size:15px;font-weight:600;padding:12px 28px;border-radius:99px;border:1px solid rgba(255,255,255,.15);background:transparent;color:var(--text);cursor:pointer;white-space:nowrap;transition:all .15s}
#checkBtn:hover{background:rgba(255,255,255,.06)}
#checkBtn:disabled{opacity:.3;cursor:default}

/* FEEDBACK */
#feedback{font-size:20px;color:var(--muted);text-align:center;min-height:28px;line-height:1.5}
#feedback.ok{color:var(--green)}
#feedback.err{color:var(--red)}
#feedback.rev{color:var(--gold)}
#hintText{font-size:16px;color:var(--faint);text-align:center;min-height:22px}

/* BOTTOM NAV - fixed */
#nav{position:fixed;bottom:0;left:0;right:0;height:72px;background:rgba(10,10,15,.97);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 16px}
.nav-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.06);color:var(--text)}
.nav-btn:disabled{opacity:.2;cursor:default}
#dotsWrap{display:flex;gap:5px;align-items:center;overflow-x:auto;max-width:480px;padding:4px;scrollbar-width:none}
#dotsWrap::-webkit-scrollbar{display:none}
.dn{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:transparent;cursor:pointer;flex-shrink:0;transition:all .15s}
.dn.cur{width:22px;border-radius:99px;background:var(--blue);border-color:var(--blue)}
.dn.dok{background:var(--green);border-color:var(--green)}
.dn.derr{background:var(--red);border-color:var(--red)}
.dn.drev{background:var(--gold);border-color:var(--gold)}

/* SLIDE ACTIONS */
#actions{position:fixed;bottom:76px;right:16px;display:flex;gap:6px}
.tiny{font-size:10px;padding:4px 10px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--faint);cursor:pointer;transition:all .15s}
.tiny:hover{color:var(--muted);border-color:rgba(255,255,255,.2)}

/* ── MOBILE (iPhone and similar) ── */
@media(max-width:600px){
  html,body{overflow:hidden;height:100%;height:100dvh}

  #header{height:48px;padding:0 14px}
  .brand{font-size:12px}
  .hstat{font-size:11px}

  #tabs{top:48px;padding:6px 10px;gap:5px}
  .tab{font-size:10px;padding:3px 10px}

  #slide{top:92px;bottom:70px;padding:10px 14px;align-items:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch}

  .slide-inner{gap:10px;padding-bottom:8px}

  .q-counter{font-size:12px}

  .sent-box{border-radius:16px;padding:20px 18px 16px}
  .orig-sent{font-size:16px;margin-bottom:12px;line-height:1.5}
  .kw-big{font-size:36px;margin-bottom:8px;letter-spacing:.04em}
  .gram-tag{font-size:11px;padding:3px 8px}

  .ans-row{flex-direction:column;gap:8px;align-items:stretch}
  .ans-pre,.ans-suf{font-size:15px;max-width:100%;text-align:center}
  #ansInput{font-size:18px;min-width:unset;width:100%;padding:10px 8px;border-bottom:2px solid var(--faint)}
  #ansInput::placeholder{font-size:15px}
  #checkBtn{font-size:14px;padding:12px 0;width:100%;border-radius:12px;border:1px solid rgba(255,255,255,.15)}

  #feedback{font-size:15px;min-height:20px}
  #hintText{font-size:12px;min-height:16px}

  #nav{height:70px;gap:8px;padding:0 10px}
  .nav-btn{width:40px;height:40px;font-size:20px}
  #dotsWrap{max-width:calc(100vw - 120px);gap:4px}
  .dn{width:7px;height:7px}
  .dn.cur{width:18px}

  #actions{bottom:74px;right:10px;gap:5px}
  .tiny{font-size:9px;padding:3px 8px}
}
</style>
</head>
<body>

<div id="header">
  <div class="brand">B2 Part 4 <span>Key Word Transformations</span></div>
  <div class="hstats">
    <div class="hstat"><span class="dot dg"></span><strong id="gOk">0</strong> correct</div>
    <div class="hstat"><span class="dot dr"></span><strong id="gErr">0</strong> wrong</div>
    <div class="hstat" id="gTot">0 / 160</div>
  </div>
</div>

<div id="tabs"></div>

<div id="slide">
  <div class="slide-inner">
    <div class="q-counter" id="qCounter">Question 1 of 160</div>
    <div class="sent-box">
      <div class="orig-sent" id="origSent"></div>
      <div class="kw-big" id="kwBig"></div>
      <span class="gram-tag" id="gramTag"></span>
    </div>
    <div class="ans-row">
      <span class="ans-pre" id="ansPre"></span>
      <input id="ansInput" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="type the missing words…">
      <span class="ans-suf" id="ansSuf"></span>
      <button id="checkBtn">Check</button>
    </div>
    <div id="feedback"></div>
    <div id="hintText"></div>
  </div>
</div>

<div id="actions">
  <button class="tiny" id="revBtn">Show answer</button>
  <button class="tiny" id="resetBtn">Reset section</button>
</div>

<div id="nav">
  <button class="nav-btn" id="prevBtn">&#8592;</button>
  <div id="dotsWrap"></div>
  <button class="nav-btn" id="nextBtn">&#8594;</button>
</div>

const ALL = PAGES.flatMap(p => p.items);
const answered = {};
let gOk=0, gErr=0, gAnswered=0, curIdx=0;

function norm(s){ return s.trim().toLowerCase().replace(/['']/g,"'").replace(/\s+/g,' '); }
function pageOf(n){ return PAGES.findIndex(p=>n>=p.range[0]&&n<=p.range[1]); }

function buildTabs(){
  const c=document.getElementById('tabs');
  PAGES.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='tab'+(i===0?' active':'');
    b.id='tab-'+i;
    b.textContent=p.label;
    b.onclick=()=>goToSection(i);
    c.appendChild(b);
  });
}

function updateTabs(){
  const curPage=pageOf(ALL[curIdx].n);
  PAGES.forEach((p,i)=>{
    const t=document.getElementById('tab-'+i);
    if(!t)return;
    t.classList.toggle('active', i===curPage);
    let ok=0, done=0;
    p.items.forEach(it=>{ if(answered[it.n]){done++; if(answered[it.n]==='ok')ok++; }});
    t.classList.remove('tok','tmix');
    if(done===p.items.length && done>0) t.classList.add(ok===p.items.length?'tok':'tmix');
  });
}

function buildDots(){
  const c=document.getElementById('dotsWrap');
  c.innerHTML='';
  ALL.forEach((item,i)=>{
    const d=document.createElement('div');
    const r=answered[item.n];
    let cls='dn'+(i===curIdx?' cur':'')+(r==='ok'?' dok':r==='err'?' derr':r==='revealed'?' drev':'');
    d.className=cls;
    d.title='Q'+item.n;
    d.onclick=()=>goTo(i);
    c.appendChild(d);
  });
  const active=c.children[curIdx];
  if(active) active.scrollIntoView({inline:'center',behavior:'smooth'});
}

function render(){
  const item=ALL[curIdx];
  const r=answered[item.n];
  document.getElementById('qCounter').textContent='Question '+item.n+' of 160';
  document.getElementById('origSent').textContent=item.sent;
  document.getElementById('kwBig').textContent=item.key;
  document.getElementById('gramTag').textContent=item.grammar;
  document.getElementById('ansPre').textContent=item.pre;
  document.getElementById('ansSuf').textContent=item.post;
  const inp=document.getElementById('ansInput');
  const btn=document.getElementById('checkBtn');
  const fb=document.getElementById('feedback');
  const ht=document.getElementById('hintText');
  if(r){
    inp.value=item.blank;
    inp.disabled=true;
    inp.className='ans-input '+(r==='ok'?'ok':r==='err'?'err':'rev');
    btn.disabled=true;
    if(r==='ok'){fb.className='feedback ok';fb.textContent='Correct!';}
    else if(r==='err'){fb.className='feedback err';fb.textContent='Not quite — correct answer shown.';}
    else{fb.className='feedback rev';fb.textContent='Answer revealed.';}
    ht.textContent=item.hint;
  } else {
    inp.value='';
    inp.disabled=false;
    inp.className='ans-input';
    btn.disabled=false;
    fb.className='feedback';fb.textContent='';
    ht.textContent='';
    setTimeout(()=>inp.focus(),80);
  }
  document.getElementById('prevBtn').disabled=curIdx===0;
  document.getElementById('nextBtn').disabled=curIdx===ALL.length-1;
  buildDots();
  updateTabs();
}

function check(){
  const item=ALL[curIdx];
  if(answered[item.n])return;
  const inp=document.getElementById('ansInput');
  const ok=norm(inp.value)===norm(item.blank);
  answered[item.n]=ok?'ok':'err';
  if(ok)gOk++; else gErr++;
  gAnswered++;
  document.getElementById('gOk').textContent=gOk;
  document.getElementById('gErr').textContent=gErr;
  document.getElementById('gTot').textContent=gAnswered+' / 160';
  render();
}

function goTo(i){
  curIdx=Math.max(0,Math.min(ALL.length-1,i));
  render();
}

function goToSection(pi){
  const n=PAGES[pi].range[0];
  const i=ALL.findIndex(it=>it.n===n);
  if(i>=0)goTo(i);
}

document.getElementById('prevBtn').onclick=()=>goTo(curIdx-1);
document.getElementById('nextBtn').onclick=()=>goTo(curIdx+1);
document.getElementById('checkBtn').onclick=check;
document.getElementById('ansInput').onkeydown=e=>{if(e.key==='Enter')check();};

document.getElementById('revBtn').onclick=()=>{
  const item=ALL[curIdx];
  if(answered[item.n])return;
  answered[item.n]='revealed';
  gAnswered++;
  document.getElementById('gTot').textContent=gAnswered+' / 160';
  render();
};

document.getElementById('resetBtn').onclick=()=>{
  const pi=pageOf(ALL[curIdx].n);
  PAGES[pi].items.forEach(it=>{
    const r=answered[it.n];
    if(r){
      if(r==='ok')gOk--;
      else if(r==='err')gErr--;
      gAnswered--;
      delete answered[it.n];
    }
  });
  document.getElementById('gOk').textContent=gOk;
  document.getElementById('gErr').textContent=gErr;
  document.getElementById('gTot').textContent=gAnswered+' / 160';
  render();
};

buildTabs();
render();

// Touch swipe — left = next, right = prev
let tsX=0, tsY=0;
document.addEventListener('touchstart',e=>{tsX=e.touches[0].clientX;tsY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tsX;
  const dy=e.changedTouches[0].clientY-tsY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
    if(dx<0&&curIdx<ALL.length-1)goTo(curIdx+1);
    else if(dx>0&&curIdx>0)goTo(curIdx-1);
  }
},{passive:true});
</script>
